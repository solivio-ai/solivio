name: Docker build

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the full production image (deps → module-builder → build → runner)
      # without pushing. This catches Dockerfile breakage on PRs, before it can
      # reach the push-to-main "Build & push image" workflow.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/solivio/Dockerfile
          target: runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
