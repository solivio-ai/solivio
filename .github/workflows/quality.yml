name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate module wiring
        run: yarn generate

      - name: Check formatting, lint rules, and imports
        run: yarn check

      - name: Typecheck
        run: yarn typecheck

      - name: Check database schema drift
        run: yarn db:check

      - name: Prepare app environment
        run: |
          cat > apps/solivio/.env.local <<'EOF'
          DATABASE_URL=postgresql://solivio:solivio@localhost:5432/solivio
          OPENAI_API_KEY=
          BETTER_AUTH_URL=http://localhost:3000
          BETTER_AUTH_SECRET=solivio-ci-better-auth-secret-solivio-ci
          AUTH_SIGNUP_ENABLED=true
          AUTH_CREDENTIALS_ENABLED=true
          AUTH_SSO_ENABLED=false
          EOF

      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium

      - name: Start database and apply migrations
        run: yarn setup

      - name: Run end-to-end tests
        run: yarn e2e

      - name: Stop database
        if: always()
        run: yarn db:down
