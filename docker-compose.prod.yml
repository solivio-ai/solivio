services:
  traefik:
    image: traefik:v3.6
    container_name: solivio-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt

  db:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: solivio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - solivio-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/solivio-ai/solivio-app:${IMAGE_TAG:-latest}
    container_name: solivio-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL_OFFER_GENERATION: ${OPENAI_MODEL_OFFER_GENERATION:-}
      OPENAI_MODEL_OFFER_VALIDATION: ${OPENAI_MODEL_OFFER_VALIDATION:-}
      OPENAI_MODEL_OFFER_NAME: ${OPENAI_MODEL_OFFER_NAME:-}
      OPENAI_MODEL_CHAT: ${OPENAI_MODEL_CHAT:-}
      OPENAI_MODEL_PRODUCT_SEARCH: ${OPENAI_MODEL_PRODUCT_SEARCH:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_SIGNUP_ENABLED: ${AUTH_SIGNUP_ENABLED:-true}
      AUTH_CREDENTIALS_ENABLED: ${AUTH_CREDENTIALS_ENABLED:-true}
      AUTH_SSO_ENABLED: ${AUTH_SSO_ENABLED:-false}
      SOLIVIO_CONFIG_PATH: /run/config/solivio.config.json
    volumes:
      - ./solivio.config.json:/run/config/solivio.config.json:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${APP_HOST:-demo.solivio.ai}`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.services.app.loadbalancer.server.port=3000

volumes:
  solivio-db:
  traefik-letsencrypt:
