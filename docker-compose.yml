services:
  db:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: solivio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solivio}
      POSTGRES_USER: ${POSTGRES_USER:-solivio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solivio}
    ports:
      - "5432:5432"
    volumes:
      - solivio-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solivio} -d ${POSTGRES_DB:-solivio}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  solivio-db:
